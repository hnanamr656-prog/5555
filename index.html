<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AH STORE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-yellow-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">

  <!-- Login -->
  <div id="loginDiv" class="bg-white p-6 rounded-2xl shadow-xl text-center">
    <h2 class="text-2xl font-bold mb-4">AH STORE 💖</h2>
    <input id="email" type="email" class="w-full p-3 border rounded-xl mb-3" placeholder="البريد الإلكتروني">
    <input id="password" type="password" class="w-full p-3 border rounded-xl mb-3" placeholder="كلمة السر">
    <button onclick="login()" class="w-full bg-pink-500 text-white p-3 rounded-xl">دخول</button>
  </div>

  <!-- User -->
  <div id="mainDiv" class="hidden bg-white p-6 rounded-2xl shadow-xl">
    <h3 class="text-xl mb-3">اهلا <span id="user"></span> 👋</h3>
    <div class="bg-pink-50 p-4 rounded-xl mb-4">
      <p id="idea" class="font-bold"></p>
      <p id="motivation" class="text-sm mt-2"></p>
    </div>
    <textarea id="note" class="w-full p-3 border rounded-xl" placeholder="اكتب ملاحظتك..."></textarea>
    <button onclick="addNote()" class="w-full bg-green-500 text-white p-3 rounded-xl mt-2">حفظ</button>
    <ul id="list" class="mt-4 text-sm"></ul>
    <button onclick="logout()" class="w-full bg-gray-400 text-white p-2 rounded-xl mt-3">خروج</button>
  </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 ضع هنا firebaseConfig الخاص بمشروعك
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ideas = ["اعرضي المنتج بفيديو","نزلي ستوري جذابة","اعملي عرض خاص"];
const motiv = ["انتي قدها 💪","كملي 🔥","هتنجحي 💖","انتي قوية 🌟"];

function login(){
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();
  signInWithEmailAndPassword(auth, email, pass)
    .catch(err => alert("خطأ في تسجيل الدخول: " + err.message));
}

onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById("loginDiv").classList.add("hidden");
    document.getElementById("mainDiv").classList.remove("hidden");
    document.getElementById("user").innerText = user.email;
    showDaily();
    loadNotes(user.uid);
  } else {
    document.getElementById("loginDiv").classList.remove("hidden");
    document.getElementById("mainDiv").classList.add("hidden");
  }
});

function logout(){ signOut(auth); }

function showDaily(){
  let d = new Date().getDate();
  idea.innerText = ideas[d % ideas.length];
  motivation.innerText = motiv[d % motiv.length];
}

async function addNote(){
  const val = document.getElementById("note").value.trim();
  if(!val) return;
  const user = auth.currentUser;
  await addDoc(collection(db, "users", user.uid, "notes"), {
    text: val,
    date: new Date().toLocaleDateString()
  });
  document.getElementById("note").value = "";
  loadNotes(user.uid);
}

async function loadNotes(uid){
  let ul = document.getElementById("list");
  ul.innerHTML = "";
  const snapshot = await getDocs(collection(db, "users", uid, "notes"));
  snapshot.forEach(docSnap => {
    let li = document.createElement("li");
    li.innerText = docSnap.data().date + " - " + docSnap.data().text;
    ul.appendChild(li);
  });
}
</script>

</body>
</html>
