<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AH STORE</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-yellow-100 min-h-screen flex items-center justify-center"><div class="w-full max-w-md"><!-- Login --><div id="loginDiv" class="bg-white p-6 rounded-2xl shadow-xl text-center">
<h2 class="text-2xl font-bold mb-4">AH STORE 💖</h2>
<input id="username" class="w-full p-3 border rounded-xl mb-3" placeholder="اكتب اسمك">
<button onclick="login()" class="w-full bg-pink-500 text-white p-3 rounded-xl">دخول</button>
</div><!-- User --><div id="mainDiv" class="hidden bg-white p-6 rounded-2xl shadow-xl">
<h3 class="text-xl mb-3">اهلا <span id="user"></span> 👋</h3><div class="bg-pink-50 p-4 rounded-xl mb-4">
<p id="idea" class="font-bold"></p>
<p id="motivation" class="text-sm mt-2"></p>
</div><textarea id="note" class="w-full p-3 border rounded-xl" placeholder="اكتب ملاحظتك..."></textarea><button onclick="addNote()" class="w-full bg-green-500 text-white p-3 rounded-xl mt-2">حفظ</button>

<ul id="list" class="mt-4 text-sm"></ul><button onclick="logout()" class="w-full bg-gray-400 text-white p-2 rounded-xl mt-3">خروج</button>

</div><!-- Manager --><div id="managerDiv" class="hidden bg-white p-6 rounded-2xl shadow-xl">
<h3 class="text-xl mb-3">لوحة المدير 👑</h3><div id="report" class="bg-yellow-100 p-3 rounded-xl mb-3 text-sm"></div><div class="overflow-auto max-h-64">
<table class="w-full text-sm">
<thead><tr class="bg-gray-100"><th>الاسم</th><th>الملاحظات</th></tr></thead>
<tbody id="table"></tbody>
</table>
</div><button onclick="logout()" class="w-full bg-gray-400 text-white p-2 rounded-xl mt-3">خروج</button>

</div></div><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><script>
const firebaseConfig = {
  apiKey: "AIzaSyBWS4bOO7SQ8TYJaHJ--6VJMjOONy9Iz0o",
  authDomain: "ah-store-51aa9.firebaseapp.com",
  projectId: "ah-store-51aa9",
  storageBucket: "ah-store-51aa9.firebasestorage.app",
  messagingSenderId: "481821079697",
  appId: "1:481821079697:web:2a3784f09238d3980de730"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser="";

const ideas=["اعرضي المنتج بفيديو","نزلي ستوري جذابة","اعملي عرض خاص"];
const motiv=["انتي قدها 💪","كملي 🔥","هتنجحي 💖","انتي قوية 🌟"];

function login(){
let name=document.getElementById("username").value.trim();
if(!name) return alert("اكتبي اسمك");
currentUser=name;

if(name.toLowerCase()==="manager"){
document.getElementById("loginDiv").classList.add("hidden");
document.getElementById("managerDiv").classList.remove("hidden");
loadManager();
return;
}

document.getElementById("loginDiv").classList.add("hidden");
document.getElementById("mainDiv").classList.remove("hidden");
document.getElementById("user").innerText=name;

showDaily();
loadNotes();
}

function logout(){ location.reload(); }

function showDaily(){
let d=new Date().getDate();
idea.innerText=ideas[d%ideas.length];
motivation.innerText=motiv[d%motiv.length];
}

function addNote(){
let val=document.getElementById("note").value;
if(!val) return;

db.collection("users").doc(currentUser).collection("notes").add({
text:val,
date:new Date().toLocaleDateString()
});

note.value="";
loadNotes();
}

function loadNotes(){
let ul=document.getElementById("list");
ul.innerHTML="";

db.collection("users").doc(currentUser).collection("notes")
.get().then(res=>{
res.forEach(doc=>{
let li=document.createElement("li");
li.innerText=doc.data().date+" - "+doc.data().text;
ul.appendChild(li);
});
});
}

function loadManager(){
let tbody=document.getElementById("table");
tbody.innerHTML="";
let today=new Date().toLocaleDateString();
let total=0;

db.collection("users").get().then(users=>{
users.forEach(user=>{
let name=user.id;

db.collection("users").doc(name).collection("notes").get().then(notes=>{
let texts=[];
notes.forEach(n=>{
texts.push(n.data().text);
if(n.data().date===today) total++;
});

let tr=document.createElement("tr");
tr.innerHTML=`<td>${name}</td><td>${texts.join(" , ")}</td>`;
tbody.appendChild(tr);

});
});

document.getElementById("report").innerText=`📊 عدد الملاحظات اليوم: ${total}`;
});
}
</script></body>
</html>
