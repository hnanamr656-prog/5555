<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<title>برنامج AH STORE - مدير ومسوقين</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f8ff; text-align: center; padding: 30px; }
input, button, textarea { padding: 10px; font-size: 16px; margin: 5px; }
.card { background: #ffeebb; padding: 20px; margin: 10px auto; border-radius: 10px; width: 80%; }
table { margin: 20px auto; border-collapse: collapse; width: 90%; }
th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
th { background-color: #ffebcc; }
#mainDiv, #managerDiv { display: none; }
</style>
</head>
<body><h1>برنامج AH STORE - مدير ومسوقين</h1><div id="loginDiv">
    <input type="text" id="username" placeholder="اكتب اسمك">
    <button onclick="login()">تسجيل الدخول</button>
</div><div id="mainDiv">
    <h2>مرحبا <span id="currentUser"></span></h2><div class="card">
    <h3>فكرة اليوم</h3>
    <p id="idea"></p>
    <h3>نصيحة تسويقية</h3>
    <p id="tip"></p>
    <h3>تحفيزك اليومي</h3>
    <p id="motivation"></p>
</div>

<div class="card">
    <h3>اقتراحاتك اليومية</h3>
    <textarea id="suggestionInput" placeholder="اكتب اقتراحك هنا"></textarea><br>
    <button onclick="addSuggestion()">أضف الاقتراح</button>
    <ul id="suggestionList"></ul>
</div>

<div class="card">
    <h3>ملاحظاتك اليومية</h3>
    <textarea id="commentInput" placeholder="اكتب ملاحظتك هنا"></textarea><br>
    <button onclick="addComment()">أضف الملاحظة</button>
    <ul id="commentList"></ul>
</div>

<button onclick="logout()">تسجيل الخروج</button>

</div><div id="managerDiv">
    <h2>لوحة المدير</h2>
    <table id="managerTable">
        <thead>
            <tr>
                <th>المسوق</th>
                <th>ملاحظات اليوم</th>
                <th>اقتراحات اليوم</th>
                <th>إجمالي النقاط</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div id="dailyReport"></div>
    <button onclick="logout()">تسجيل الخروج</button>
</div><script>
let currentUser = null;
const ideas = ["استخدم فيديو قصير للمنتج", "اعرض المنتج بطريقة مختلفة", "صوّر المنتج مع خلفية جذابة", "اعمل خصم محدود", "اصنع قصة صغيرة حول المنتج"];
const tips = ["نشر المحتوى باستمرار يجذب متابعين أكثر", "استخدم الهاشتاجات المناسبة", "ركز على ميزة واحدة في كل منشور", "التفاعل مع التعليقات يزيد المبيعات"];
const motivations = ["كل يوم فرصة جديدة للنجاح! 💪", "ابدأ اليوم وكن الأفضل! 🚀", "التحديات تصنع الأفضل! 🌟", "كل خطوة صغيرة تقربك من الهدف 💖"];
let usedIndices = {idea:[], tip:[], motivation:[]};

function login(){
    const username = document.getElementById("username").value.trim();
    if(!username){ alert("اكتب اسمك من فضلك!"); return; }
    currentUser = username;
    
    if(!localStorage.getItem("salesData")) localStorage.setItem("salesData", JSON.stringify({}));
    let salesData = JSON.parse(localStorage.getItem("salesData"));

    if(username.toLowerCase() === "manager"){
        document.getElementById("loginDiv").style.display="none";
        document.getElementById("managerDiv").style.display="block";
        renderManager();
        return;
    }

    if(!salesData[username]) salesData[username] = {points:0, comments:[], suggestions:[], lastVisit: null};
    localStorage.setItem("salesData", JSON.stringify(salesData));

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("mainDiv").style.display="block";
    document.getElementById("currentUser").innerText = currentUser;

    showContent();
    loadComments();
    loadSuggestions();
    checkMotivation();
}

function logout(){
    currentUser = null;
    document.getElementById("loginDiv").style.display="block";
    document.getElementById("mainDiv").style.display="none";
    document.getElementById("managerDiv").style.display="none";
    document.getElementById("username").value = "";
}

function getRandom(arr,key){
    if(usedIndices[key].length === arr.length) usedIndices[key]=[];
    let available = arr.map((_,i)=>i).filter(i=>!usedIndices[key].includes(i));
    let idx = available[Math.floor(Math.random()*available.length)];
    usedIndices[key].push(idx);
    return arr[idx];
}

function showContent(){
    document.getElementById("idea").innerText = getRandom(ideas,'idea');
    document.getElementById("tip").innerText = getRandom(tips,'tip');
    document.getElementById("motivation").innerText = getRandom(motivations,'motivation');
}

function addComment(){
    const val = document.getElementById("commentInput").value.trim();
    if(val){
        let salesData = JSON.parse(localStorage.getItem("salesData"));
        salesData[currentUser].comments.push({text: val, date: new Date().toLocaleDateString()});
        localStorage.setItem("salesData", JSON.stringify(salesData));
        document.getElementById("commentInput").value="";
        loadComments();
    }
}

function loadComments(){
    const ul = document.getElementById("commentList");
    ul.innerHTML="";
    let salesData = JSON.parse(localStorage.getItem("salesData"));
    salesData[currentUser].comments.forEach(c=>{
        const li=document.createElement("li");
        li.innerText=`${c.date}: ${c.text}`;
        ul.appendChild(li);
    });
}

function addSuggestion(){
    const val = document.getElementById("suggestionInput").value.trim();
    if(val){
        let salesData = JSON.parse(localStorage.getItem("salesData"));
        salesData[currentUser].suggestions.push({text: val, date: new Date().toLocaleDateString()});
        localStorage.setItem("salesData", JSON.stringify(salesData));
        document.getElementById("suggestionInput").value="";
        loadSuggestions();
    }
}

function loadSuggestions(){
    const ul = document.getElementById("suggestionList");
    ul.innerHTML="";
    let salesData = JSON.parse(localStorage.getItem("salesData"));
    salesData[currentUser].suggestions.forEach(s=>{
        const li=document.createElement("li");
        li.innerText=`${s.date}: ${s.text}`;
        ul.appendChild(li);
    });
}

function renderManager(){
    let salesData = JSON.parse(localStorage.getItem("salesData"));
    const tbody = document.querySelector("#managerTable tbody");
    tbody.innerHTML="";
    let today = new Date().toLocaleDateString();
    let dailyReportText = `اليوم: ${today}<br>`;
    let dailyUsers=0, dailyComments=0, dailySuggestions=0;
    for(let user in salesData){
        if(user.toLowerCase()==="manager") continue;
        const commentsToday = salesData[user].comments.filter(c=>c.date===today);
        const suggestionsToday = salesData[user].suggestions.filter(s=>s.date===today);
        if(commentsToday.length || suggestionsToday.length) dailyUsers++;
        dailyComments += commentsToday.length;
        dailySuggestions += suggestionsToday.length;
        const tr=document.createElement("tr");
        tr.innerHTML=`<td>${user}</td><td>${commentsToday.map(c=>c.text).join(", ")}</td><td>${suggestionsToday.map(s=>s.text).join(", ")}</td><td>${salesData[user].points}</td>`;
        tbody.appendChild(tr);
    }
    dailyReportText += `عدد المسوقين اليوم: ${dailyUsers}, عدد الملاحظات: ${dailyComments}, عدد الاقتراحات: ${dailySuggestions}`;
    document.getElementById("dailyReport").innerHTML=dailyReportText;
}

function checkMotivation(){
    let salesData = JSON.parse(localStorage.getItem("salesData"));
    const today = new Date().toLocaleDateString();
    if(!salesData[currentUser].lastVisit || salesData[currentUser].lastVisit!==today){
        alert("💡 افتح البرنامج اليوم للحصول على فكرة جديدة وتحفيزك اليومي!");
        salesData[currentUser].lastVisit = today;
        localStorage.setItem("salesData", JSON.stringify(salesData));
    }
}

setInterval(()=>{if(currentUser && currentUser.toLowerCase() !== "manager") showContent();},1000*60*60*24);
</script></body>
</html>
