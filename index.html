<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AH STORE</title>
<script type="module">
// Firebase modular SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
import { getFirestore, doc, setDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDE5PkH3A3w4_1IFKWcqOtI8QL-of7c1uk",
  authDomain: "ah-store-70da4.firebaseapp.com",
  projectId: "ah-store-70da4",
  storageBucket: "ah-store-70da4.firebasestorage.app",
  messagingSenderId: "159866981134",
  appId: "1:159866981134:web:b6f3a40ada0734f1e0255f",
  measurementId: "G-MX5N3DW92N"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

// بيانات اليوم
const ideas=["اعرضي المنتج بفيديو","نزلي ستوري جذابة","اعملي عرض خاص"];
const motiv=["انتي قدها 💪","كملي 🔥","هتنجحي 💖","انتي قوية 🌟"];

let currentUser="";

// تسجيل الدخول
window.login = async function(){
  let name=document.getElementById("username").value.trim();
  if(!name) return alert("اكتبي اسمك");
  currentUser=name;

  if(name.toLowerCase()==="manager"){
    let password=document.getElementById("password").value;
    if(password !== "708090") return alert("كلمة السر غلط!");
    document.getElementById("loginDiv").classList.add("hidden");
    document.getElementById("managerDiv").classList.remove("hidden");
    await loadManager();
    return;
  }

  document.getElementById("loginDiv").classList.add("hidden");
  document.getElementById("mainDiv").classList.remove("hidden");
  document.getElementById("user").innerText=name;

  showDaily();
  await loadNotes();
}

// الخروج
window.logout = function(){ location.reload(); }

// الجمل اليومية
function showDaily(){
  let today=new Date();
  let dayIndex = today.getFullYear()*365 + today.getMonth()*30 + today.getDate();
  document.getElementById("idea").innerText = ideas[dayIndex % ideas.length];
  document.getElementById("motivation").innerText = motiv[dayIndex % motiv.length];
}

// إضافة ملاحظة + إشعار
window.addNote = async function(){
  let val=document.getElementById("note").value;
  if(!val) return;

  await setDoc(doc(db, "users", currentUser), { name: currentUser }, { merge:true });
  await addDoc(collection(db, "users", currentUser, "notes"), {
    text: val,
    date: new Date().toLocaleDateString()
  });

  document.getElementById("note").value="";
  await loadNotes();

  let notif = document.getElementById("notif");
  notif.innerText = "✅ تمت إضافة الملاحظة بنجاح!";
  notif.classList.remove("hidden");
  setTimeout(()=>{ notif.classList.add("hidden"); }, 3000);
}

// تحميل ملاحظات المسوق
async function loadNotes(){
  let ul=document.getElementById("list");
  ul.innerHTML="";
  const notesSnapshot = await getDocs(collection(db, "users", currentUser, "notes"));
  notesSnapshot.forEach(docu=>{
    let li=document.createElement("li");
    li.innerText=docu.data().date+" - "+docu.data().text;
    ul.appendChild(li);
  });
}

// لوحة المدير
async function loadManager(){
  let tbody=document.getElementById("table");
  let today=new Date().toLocaleDateString();
  let total=0;
  let leaderboardObj={};
  tbody.innerHTML="";
  document.getElementById("report").innerText="";
  document.getElementById("leaderboard").innerText="";
  document.getElementById("emptyMsg").innerText="";

  const usersSnapshot = await getDocs(collection(db, "users"));
  let anyData=false;

  for(const userDoc of usersSnapshot.docs){
    let name = userDoc.id;
    const notesSnapshot = await getDocs(collection(db, "users", name, "notes"));
    let texts=[], countToday=0;
    notesSnapshot.forEach(n=>{
      texts.push(n.data().text);
      if(n.data().date===today) countToday++;
    });

    if(texts.length>0) anyData=true;
    total += countToday;
    leaderboardObj[name] = countToday;

    if(texts.length>0){
      let tr=document.createElement("tr");
      tr.innerHTML=`<td>${name}</td><td>${texts.join(" , ")}</td>`;
      tbody.appendChild(tr);
    }
  }

  // Leaderboard
  let sorted = Object.entries(leaderboardObj).sort((a,b)=>b[1]-a[1]);
  let boardHtml = "🏆 ترتيب أفضل المسوقين اليوم:\n";
  sorted.forEach(([u, c], idx)=>{
    if(c>0) boardHtml+=`${idx+1}. ${u} - ${c} ملاحظات\n`;
  });
  document.getElementById("leaderboard").innerText = boardHtml;
  document.getElementById("report").innerText=`📊 عدد الملاحظات اليوم: ${total}`;
  if(!anyData) document.getElementById("emptyMsg").innerText="لا توجد ملاحظات حتى الآن";
}
</script>

<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-100 to-yellow-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">

<!-- Login -->
<div id="loginDiv" class="bg-white p-6 rounded-2xl shadow-xl text-center">
<h2 class="text-2xl font-bold mb-4">AH STORE 💖</h2>
<input id="username" class="w-full p-3 border rounded-xl mb-3" placeholder="اكتب اسمك">
<input id="password" type="password" class="w-full p-3 border rounded-xl mb-3 hidden" placeholder="كلمة السر للمدير">
<button onclick="login()" class="w-full bg-pink-500 text-white p-3 rounded-xl">دخول</button>
</div>

<!-- User -->
<div id="mainDiv" class="hidden bg-white p-6 rounded-2xl shadow-xl">
<h3 class="text-xl mb-3">اهلا <span id="user"></span> 👋</h3>

<div class="bg-pink-50 p-4 rounded-xl mb-4">
<p id="idea" class="font-bold"></p>
<p id="motivation" class="text-sm mt-2"></p>
</div>

<textarea id="note" class="w-full p-3 border rounded-xl" placeholder="اكتب ملاحظتك..."></textarea>
<button onclick="addNote()" class="w-full bg-green-500 text-white p-3 rounded-xl mt-2">حفظ</button>

<ul id="list" class="mt-4 text-sm"></ul>

<div id="notif" class="hidden bg-green-200 text-green-900 p-2 rounded-xl mt-2 text-center font-semibold"></div>

<button onclick="logout()" class="w-full bg-gray-400 text-white p-2 rounded-xl mt-3">خروج</button>
</div>

<!-- Manager -->
<div id="managerDiv" class="hidden bg-white p-6 rounded-2xl shadow-xl">
<h3 class="text-xl mb-3">لوحة المدير 👑</h3>

<div id="report" class="bg-yellow-100 p-3 rounded-xl mb-3 text-sm"></div>
<div id="leaderboard" class="bg-pink-100 p-3 rounded-xl mb-3 text-sm"></div>

<div class="overflow-auto max-h-64">
<table class="w-full text-sm">
<thead><tr class="bg-gray-100"><th>الاسم</th><th>الملاحظات</th></tr></thead>
<tbody id="table"></tbody>
</table>
<div id="emptyMsg" class="text-center mt-2 text-gray-500 font-semibold"></div>
</div>

<button onclick="logout()" class="w-full bg-gray-400 text-white p-2 rounded-xl mt-3">خروج</button>
</div>

</div>

</body>
</html>
